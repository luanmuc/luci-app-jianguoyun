name: Build luci-app-jianguoyun
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ipkg-utils build-essential

      - name: Build IPK
        run: |
          BUILD_DIR=$(mktemp -d)
          mkdir -p "${BUILD_DIR}/CONTROL"
          cp -r ./root/* "${BUILD_DIR}/"

          cat > "${BUILD_DIR}/CONTROL/control" << EOF
Package: luci-app-jianguoyun
Version: 3.1
Architecture: all
Section: luci
Priority: optional
Maintainer: luanmuc
Description: Jianguoyun Backup Plugin for OpenWrt
Depends: luci-base, curl, wget
EOF

          chmod 755 "${BUILD_DIR}/CONTROL"
          find "${BUILD_DIR}" -type d -exec chmod 755 {} \;
          find "${BUILD_DIR}" -name "*.sh" -exec chmod 755 {} \;
          find "${BUILD_DIR}" -name "*.lua" -exec chmod 644 {} \;

          mkdir -p output
          ipkg-build -o root -g root "${BUILD_DIR}" output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun
          path: output/
