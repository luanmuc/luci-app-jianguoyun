      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev
          # 手动下载并编译 ipkg-build
          git clone https://github.com/ipkg/ipkg-utils.git
          cd ipkg-utils
          ./autogen.sh
          ./configure
          make
          sudo make install
          cd ..
