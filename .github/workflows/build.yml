name: 云编译 - 坚果云备份插件（终极容错版）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update || true
          sudo apt-get install -y build-essential dpkg-dev || true
          echo "✅ 依赖安装完成"

      - name: 执行构建脚本
        run: chmod +x scripts/build.sh && ./scripts/build.sh

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun
          path: output/
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun
          path: output/
