name: luci-app-jianguoyun 自动打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装打包工具
        run: |
          sudo apt-get update
          sudo apt-get install -y ipkg-utils build-essential

      - name: 打包生成IPK
        run: |
          # 创建临时打包目录
          BUILD_DIR=$(mktemp -d)
          # 复制插件文件
          cp -r ./root/* $BUILD_DIR/
          mkdir -p $BUILD_DIR/CONTROL
          
          # 生成插件控制文件
          cat > $BUILD_DIR/CONTROL/control << EOF
Package: luci-app-jianguoyun
Version: 1.0.0
Architecture: all
Section: luci
Priority: optional
Title: LuCI for Jianguoyun Backup
Description: 坚果云WebDAV备份插件
Depends: curl, wget, luci-base
Maintainer: 自动打包
EOF

          # 设置文件权限
          chmod 755 $BUILD_DIR/CONTROL
          find $BUILD_DIR -type d -exec chmod 755 {} \;
          find $BUILD_DIR -name "*.sh" -exec chmod 755 {} \;
          find $BUILD_DIR -name "*.lua" -exec chmod 644 {} \;

          # 生成IPK文件
          OUTPUT_DIR=$GITHUB_WORKSPACE/output
          mkdir -p $OUTPUT_DIR
          ipkg-build -o root -g root $BUILD_DIR $OUTPUT_DIR

          # 清理临时文件
          rm -rf $BUILD_DIR

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun-安装包
          path: output/*
          retention-days: 30
