name: 云编译 - 坚果云备份插件（终极版）
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 允许提交新版本号
      - name: 执行构建脚本
        run: chmod +x scripts/build.sh && ./scripts/build.sh
      - name: 提交新版本号
        run: |
          git config --global user.name "luanmuc"
          git config --global user.email "luanmuc@users.noreply.github.com"
          git add VERSION || true
          git commit -m "Auto-increment version to $(cat VERSION)" || true
          git push || true
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun
          path: output/
