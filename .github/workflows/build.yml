name: luci-app-jianguoyun 自动打包
on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: 插件打包
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 第一步：拉取插件代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: 第二步：初始化全局环境
        id: init
        run: |
          set -eo pipefail
          # 全局重试函数（社区标准写法）
          retry() {
            local max_try=3
            local interval=2
            local count=0
            until "$@"; do
              count=$((count + 1))
              if [ $count -lt $max_try ]; then
                echo "⚠️  重试第${count}次：$*"
                sleep $interval
              else
                echo "❌  执行失败：$*"
                return 1
              fi
            done
            echo "✅ 执行成功：$*"
            return 0
          }
          # 版本号处理
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && VERSION="1.1.0"
            IS_RELEASE=1
          else
            VERSION="1.1.0"
            IS_RELEASE=0
          fi
          # 初始化目录
          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          BUILD_LOG="${OUTPUT_DIR}/build.log"
          retry mkdir -p "${OUTPUT_DIR}"
          # 初始化日志
          echo "=== luci-app-jianguoyun 打包日志 ===" > "${BUILD_LOG}"
          echo "打包时间：$(date +"%Y-%m-%d %H:%M:%S")" >> "${BUILD_LOG}"
          echo "版本号：v${VERSION}" >> "${BUILD_LOG}"
          # 导出全局变量
          echo "retry=$(declare -f retry)" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "IS_RELEASE=${IS_RELEASE}" >> "${GITHUB_ENV}"
          echo "OUTPUT_DIR=${OUTPUT_DIR}" >> "${GITHUB_ENV}"
          echo "BUILD_LOG=${BUILD_LOG}" >> "${GITHUB_ENV}"
          echo "status=success" >> "${GITHUB_OUTPUT}"
          echo "✅ 全局环境初始化完成" | tee -a "${BUILD_LOG}"

      - name: 第三步：安装打包依赖
        id: install_deps
        if: steps.init.outputs.status == 'success'
        run: |
          source <(echo "$retry")
          echo "🔧 开始安装打包工具" | tee -a "${BUILD_LOG}"
          # 检测已安装工具
          if command -v ipkg-build > /dev/null 2>&1; then
            echo "✅ ipkg-build 已存在，跳过安装" | tee -a "${BUILD_LOG}"
            echo "status=success" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # 官方源安装（社区标准写法）
          retry sudo apt-get update -qq
          if retry sudo apt-get install -y -qq ipkg-utils build-essential; then
            echo "✅ 打包工具安装成功" | tee -a "${BUILD_LOG}"
            echo "status=success" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # 兼容兜底脚本（安装失败才触发）
          echo "⚠️  官方源安装失败，启用兼容兜底脚本" | tee -a "${BUILD_LOG}"
          sudo cat > /usr/local/bin/ipkg-build << 'EOF'
#!/bin/sh
set -e
usage() { echo "用法：$0 [选项] 打包目录 输出目录"; exit 1; }
while getopts "o:g:c:" opt; do
  case $opt in
    o|g|c) ;;
    *) usage ;;
  esac
done
shift $((OPTIND - 1))
BUILD_DIR="$1"
OUTPUT_DIR="$2"
[ -z "$BUILD_DIR" ] || [ ! -d "$BUILD_DIR" ] && { echo "错误：打包目录不存在"; exit 1; }
[ -z "$OUTPUT_DIR" ] && OUTPUT_DIR="."
mkdir -p "$OUTPUT_DIR"
PKG_NAME=$(grep -Po 'Package: \K.*' "$BUILD_DIR/CONTROL/control" | head -n 1 | tr -d ' ')
PKG_VERSION=$(grep -Po 'Version: \K.*' "$BUILD_DIR/CONTROL/control" | head -n 1 | tr -d ' ')
ARCH=$(grep -Po 'Architecture: \K.*' "$BUILD_DIR/CONTROL/control" | head -n 1 | tr -d ' ')
OUTPUT_FILE="${OUTPUT_DIR}/${PKG_NAME}_${PKG_VERSION}_${ARCH}.ipk"
TMP_DIR=$(mktemp -d)
tar -C "$BUILD_DIR" --exclude='CONTROL' --owner=0 --group=0 -czf "$TMP_DIR/data.tar.gz" .
tar -C "$BUILD_DIR/CONTROL" --owner=0 --group=0 -czf "$TMP_DIR/control.tar.gz" .
echo -n "2.0" > "$TMP_DIR/debian-binary"
ar -r "$OUTPUT_FILE" "$TMP_DIR/debian-binary" "$TMP_DIR/control.tar.gz" "$TMP_DIR/data.tar.gz" > /dev/null 2>&1
rm -rf "$TMP_DIR"
echo "✅ IPK生成成功：$OUTPUT_FILE"
EOF
          sudo chmod 755 /usr/local/bin/ipkg-build
          # 最终校验
          if command -v ipkg-build > /dev/null 2>&1; then
            echo "✅ 打包工具就绪" | tee -a "${BUILD_LOG}"
            echo "status=success" >> "${GITHUB_OUTPUT}"
          else
            echo "❌ 打包工具安装失败" | tee -a "${BUILD_LOG}"
            echo "status=failure" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

      - name: 第四步：18主线模块合规性校验
        id: check
        if: steps.install_deps.outputs.status == 'success'
        run: |
          source <(echo "$retry")
          echo "🔍 开始18主线模块校验" | tee -a "${BUILD_LOG}"
          # 核心模块必须存在（对应18主线的核心业务模块）
          CORE_FILES=(
            "./root/etc/config/jianguoyun"
            "./root/usr/bin/jianguoyun-backup.sh"
            "./root/usr/lib/lua/luci/controller/jianguoyun.lua"
            "./root/usr/lib/lua/luci/model/cbi/jianguoyun.lua"
          )
          # 强制校验核心文件
          CHECK_PASS=1
          for FILE in "${CORE_FILES[@]}"; do
            if [ ! -f "${FILE}" ]; then
              echo "❌ 核心文件缺失：${FILE}" | tee -a "${BUILD_LOG}"
              CHECK_PASS=0
            else
              # 自动修复Windows换行符
              sed -i 's/\r$//' "${FILE}" 2>/dev/null
              # 脚本语法校验
              if [[ "${FILE}" == *.sh ]]; then
                if bash -n "${FILE}"; then
                  echo "✅ 核心文件校验通过：${FILE}" | tee -a "${BUILD_LOG}"
                else
                  echo "❌ 脚本语法错误：${FILE}" | tee -a "${BUILD_LOG}"
                  CHECK_PASS=0
                fi
              else
                echo "✅ 核心文件校验通过：${FILE}" | tee -a "${BUILD_LOG}"
              fi
            fi
          done
          # 校验结果处理
          if [ ${CHECK_PASS} -eq 0 ]; then
            echo "❌ 核心模块校验失败，终止打包" | tee -a "${BUILD_LOG}"
            exit 1
          fi
          echo "🎉 18主线模块校验全部通过" | tee -a "${BUILD_LOG}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: 第五步：生成通用版IPK安装包
        id: build_ipk
        if: steps.check.outputs.status == 'success'
        run: |
          source <(echo "$retry")
          echo "📦 开始生成通用版IPK包" | tee -a "${BUILD_LOG}"
          # 准备打包目录
          BUILD_TMP=$(mktemp -d)
          retry cp -a ./root/* "${BUILD_TMP}/"
          retry mkdir -p "${BUILD_TMP}/CONTROL"
          # 生成control文件
          cat > "${BUILD_TMP}/CONTROL/control" << EOF
Package: luci-app-jianguoyun
Version: ${VERSION}
Architecture: all
Section: luci
Priority: optional
Title: LuCI support for Jianguoyun Backup
Description: 坚果云WebDAV备份与恢复插件，全OpenWrt版本通用
Maintainer: 自动打包
Depends: curl, wget, luci-base
EOF
          # 设置权限
          chmod 755 "${BUILD_TMP}/CONTROL"
          find "${BUILD_TMP}" -type d -exec chmod 755 {} \;
          find "${BUILD_TMP}" -type f -name "*.sh" -exec chmod 755 {} \;
          find "${BUILD_TMP}" -type f -name "*.lua" -exec chmod 644 {} \;
          # 打包（兼容多参数）
          PACKAGE_OK=0
          if retry ipkg-build -o root -g root "${BUILD_TMP}" "${OUTPUT_DIR}"; then
            PACKAGE_OK=1
          elif retry ipkg-build "${BUILD_TMP}" "${OUTPUT_DIR}"; then
            PACKAGE_OK=1
          fi
          # 结果处理
          if [ ${PACKAGE_OK} -eq 1 ] && ls "${OUTPUT_DIR}/luci-app-jianguoyun_"*.ipk > /dev/null 2>&1; then
            ORIGIN_FILE=$(ls "${OUTPUT_DIR}/luci-app-jianguoyun_"*.ipk | head -n 1)
            cp -f "${ORIGIN_FILE}" "${OUTPUT_DIR}/luci-app-jianguoyun-通用版-v${VERSION}.ipk"
            echo "✅ 通用版IPK生成完成" | tee -a "${BUILD_LOG}"
            echo "status=success" >> "${GITHUB_OUTPUT}"
            rm -rf "${BUILD_TMP}"
          else
            echo "❌ IPK打包失败" | tee -a "${BUILD_LOG}"
            echo "status=failure" >> "${GITHUB_OUTPUT}"
            rm -rf "${BUILD_TMP}"
            exit 1
          fi

      - name: 第六步：生成CMCC A10专属版IPK
        if: steps.build_ipk.outputs.status == 'success'
        continue-on-error: true
        run: |
          source <(echo "$retry")
          echo "📦 开始生成CMCC A10专属版IPK" | tee -a "${BUILD_LOG}"
          # 准备打包目录
          BUILD_TMP=$(mktemp -d)
          retry cp -a ./root/* "${BUILD_TMP}/"
          retry mkdir -p "${BUILD_TMP}/CONTROL"
          retry mkdir -p "${BUILD_TMP}/etc/uci-defaults"
          # 注入专属预配置
          cat > "${BUILD_TMP}/etc/uci-defaults/99_luci-app-jianguoyun-cmcc" << EOF
#!/bin/sh
set +e
uci set jianguoyun.settings.backup_path='/tmp/upload'
uci set jianguoyun.settings.auto_cycle='7'
uci set jianguoyun.settings.keep_count='30'
uci set jianguoyun.settings.timeout='30'
uci set jianguoyun.settings.retry_count='3'
uci set jianguoyun.auto.daily_enable='1'
uci set jianguoyun.auto.daily_keep_days='30'
uci commit jianguoyun
/etc/init.d/cron reload 2>/dev/null
rm -f /tmp/luci-indexcache
rm -rf /tmp/luci-modulecache/
exit 0
EOF
          # 生成专属control文件
          cat > "${BUILD_TMP}/CONTROL/control" << EOF
Package: luci-app-jianguoyun
Version: ${VERSION}
Architecture: all
Section: luci
Priority: optional
Title: LuCI support for Jianguoyun Backup (CMCC A10专属版)
Description: 坚果云备份插件，CMCC A10专属适配，开箱即用
Maintainer: 自动打包
Depends: curl, wget, luci-base
EOF
          # 设置权限
          chmod 755 "${BUILD_TMP}/CONTROL"
          chmod 755 "${BUILD_TMP}/etc/uci-defaults/99_luci-app-jianguoyun-cmcc"
          find "${BUILD_TMP}" -type d -exec chmod 755 {} \;
          find "${BUILD_TMP}" -type f -name "*.sh" -exec chmod 755 {} \;
          # 打包
          if retry ipkg-build -o root -g root "${BUILD_TMP}" "${OUTPUT_DIR}"; then
            ORIGIN_FILE=$(ls "${OUTPUT_DIR}/luci-app-jianguoyun_"*.ipk | tail -n 1)
            cp -f "${ORIGIN_FILE}" "${OUTPUT_DIR}/luci-app-jianguoyun-CMCC-A10专属版-v${VERSION}.ipk"
            echo "✅ CMCC A10专属版IPK生成完成" | tee -a "${BUILD_LOG}"
          else
            echo "⚠️  专属版打包失败，自动跳过" | tee -a "${BUILD_LOG}"
          fi
          rm -rf "${BUILD_TMP}"

      - name: 第七步：生成版本更新说明
        id: changelog
        if: env.IS_RELEASE == '1' && steps.build_ipk.outputs.status == 'success'
        continue-on-error: true
        run: |
          echo "📝 生成版本更新说明" | tee -a "${BUILD_LOG}"
          CHANGELOG_FILE="${OUTPUT_DIR}/版本更新说明-v${VERSION}.md"
          cat > "${CHANGELOG_FILE}" << EOF
# 坚果云备份插件 v${VERSION} 发布说明
发布时间：$(date +"%Y-%m-%d")
适配设备：全OpenWrt版本通用、CMCC A10专属适配

## 核心功能
- 坚果云WebDAV手动备份与一键恢复
- 每日自动轻量备份、每月自动全量备份
- 备份文件自动清理、超时重试、断点续传
- 全中文LuCI管理界面，开箱即用
- CMCC A10专属预配置，安装后无需额外设置

## 安装说明
1.  下载对应版本的IPK安装包
2.  上传到OpenWrt路由器后台，直接安装
3.  安装完成后，在「服务」菜单中找到「坚果云备份」
4.  填写坚果云WebDAV地址、账号、应用密码即可使用
EOF
          echo "changelog_file=${CHANGELOG_FILE}" >> "${GITHUB_OUTPUT}"

      - name: 第八步：日志归档与产物整理
        if: always()
        run: |
          echo "=== 打包结束：$(date +"%Y-%m-%d %H:%M:%S") ===" >> "${BUILD_LOG}"
          echo "📦 最终打包产物：" | tee -a "${BUILD_LOG}"
          ls -l "${OUTPUT_DIR}/" | tee -a "${BUILD_LOG}"

      - name: 第九步：上传打包产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun-安装包-v${{ env.VERSION }}
          path: ${{ env.OUTPUT_DIR }}/*
          retention-days: 30

      - name: 第十步：自动发布到Release
        if: env.IS_RELEASE == '1' && steps.build_ipk.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.changelog_file || env.OUTPUT_DIR }}/版本更新说明-v${{ env.VERSION }}.md
          files: ${{ env.OUTPUT_DIR }}/*
          fail_on_unmatched_files: false
