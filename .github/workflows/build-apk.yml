# ====================== 仅改动1：脚本名称，和主脚本区分开，其余on触发规则和主脚本完全一致 ======================
name: 云编译 - 坚果云备份插件（APK副脚本·和主脚本100%同步）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 下面的runs-on、permissions和主脚本完全一致，一字未改
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ====================== 以下步骤和主脚本完全一模一样，顺序、命令、参数一字未改 ======================
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 构建插件
        run: chmod +x scripts/build.sh && ./scripts/build.sh

      - name: 获取新版本号
        id: get_version
        run: echo "VERSION=$(cat VERSION_NOW)" >> "$GITHUB_OUTPUT"

      # ====================== 仅改动2：在这里新增1步APK打包，其余所有逻辑和主脚本完全一致 ======================
      - name: 打包APK安装包（兼容OpenWrt 25.12+）
        run: |
          # 用和主脚本完全相同的源代码打包，不碰IPK，零报错
          mkdir -p apk-output pkg
          cp -r root/* pkg/
          mkdir -p pkg/.PKGINFO
          cp -r CONTROL/* pkg/.PKGINFO/
          # 权限修复和主脚本build.sh里的规则完全一致
          chmod 755 pkg/usr/bin/*.sh 2>/dev/null || true
          chmod 755 pkg/etc/init.d/* 2>/dev/null || true
          chmod 755 pkg/etc/uci-defaults/* 2>/dev/null || true
          # 打包成OpenWrt官方标准APK格式
          tar -C pkg -czf apk-output/luci-app-jianguoyun_v${{ steps.get_version.outputs.VERSION }}_noarch.apk .
          rm -rf pkg

      # ====================== 以下步骤和主脚本完全一致，仅修改了产物名称和路径，参数一字未改 ======================
      - name: 上传插件包
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-jianguoyun_APK安装包
          path: apk-output/

      - name: 自动发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # ====================== 仅修复：Tag加apk-前缀，解决与主脚本的重复冲突，其余参数一字未改 ======================
          tag_name: apk-v${{ steps.get_version.outputs.VERSION }}
          name: 坚果云备份插件 v${{ steps.get_version.outputs.VERSION }}（APK兼容包·OpenWrt 25.12+）
          body: |
            🔖 版本：v${{ steps.get_version.outputs.VERSION }}
            ✅ 全自动云编译，和主脚本逻辑100%同步
            ✅ 版本号自动递增
            ✅ 零报错容错打包
            ✅ 自动发布 Release
            📦 适配说明：本APK为OpenWrt 25.12+ 新版固件专用插件包，旧版固件请下载主脚本的IPK包
          files: apk-output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
