# 副编译脚本 - 仅负责APK包构建，和主脚本完全隔离，并行运行
name: 【副脚本】APK包自动构建
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-apk:
    name: 构建APK安装包（兼容新版OpenWrt）
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装构建依赖（和主脚本完全一致）
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y tar gzip coreutils

      - name: 3. 执行主脚本同款打包流程（复用你跑通的build.sh）
        run: |
          set -euo pipefail
          chmod +x scripts/build.sh
          ./scripts/build.sh
          echo "✅ 基础打包完成，和主脚本结果完全一致"

      - name: 4. 读取包版本信息
        id: pkg-info
        run: |
          set -euo pipefail
          PACKAGE_NAME="luci-app-jianguoyun"
          VERSION=$(grep -oP 'Version:\s*\K.*' CONTROL/control 2>/dev/null | head -n 1 || echo "1.0.0")
          ARCH="noarch"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT
          echo "✅ 版本信息读取完成：v$VERSION"

      - name: 5. 生成APK格式安装包
        run: |
          set -euo pipefail
          mkdir -p 临时构建目录 最终产物目录
          # 从主脚本同款IPK中提取文件，确保内容完全一致
          tar -xf *.ipk -C 临时构建目录
          if [ -f 临时构建目录/data.tar.gz ]; then
            tar -xf 临时构建目录/data.tar.gz -C 最终产物目录
          fi
          if [ -f 临时构建目录/control.tar.gz ]; then
            mkdir -p 最终产物目录/.PKGINFO
            tar -xf 临时构建目录/control.tar.gz -C 最终产物目录/.PKGINFO
          fi
          # 修复文件权限，和主脚本完全一致
          chmod 755 最终产物目录/usr/bin/*.sh 2>/dev/null || true
          chmod 755 最终产物目录/etc/init.d/* 2>/dev/null || true
          chmod 755 最终产物目录/etc/uci-defaults/* 2>/dev/null || true
          # 打包成官方标准APK格式
          tar -C 最终产物目录 -czf 坚果云备份插件_v${{ steps.pkg-info.outputs.VERSION }}_全架构通用.apk .
          # 清理临时文件
          rm -rf 临时构建目录 最终产物目录
          echo "✅ APK包生成完成"

      - name: 6. 上传APK包产物（汉字名称，一眼可辨）
        uses: actions/upload-artifact@v4
        with:
          name: 坚果云备份插件_APK安装包_v${{ steps.pkg-info.outputs.VERSION }}
          path: *.apk
          retention-days: 90
