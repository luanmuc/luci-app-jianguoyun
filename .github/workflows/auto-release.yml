name: 自动给IPK/APK Release添加更新说明
on:
  release:
    types: [ published ]

jobs:
  add-note:
    name: 自动生成对应更新说明
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 提取Release信息
        id: info
        run: |
          RELEASE_TAG=${{ github.event.release.tag_name }}
          # 自动识别是IPK还是APK的Release，零错误识别
          if [[ $RELEASE_TAG == apk-* ]]; then
            PKG_TYPE="APK"
            VERSION=${RELEASE_TAG#apk-v}
          else
            PKG_TYPE="IPK"
            VERSION=${RELEASE_TAG#v}
          fi
          
          echo "PKG_TYPE=$PKG_TYPE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_OUTPUT

      - name: 生成对应更新说明
        run: |
          if [ "${{ steps.info.outputs.PKG_TYPE }}" = "IPK" ]; then
            # IPK全版本通用包专属更新说明，与主脚本完全匹配
            cat > RELEASE_NOTE.md << EOF
            ---
            ## 版本信息
            - 版本号：v${{ steps.info.outputs.VERSION }}
            - 发布时间：${{ github.event.release.published_at }}
            - 安装包类型：OpenWrt IPK 全版本通用包
            
            ## 适配说明
            | 兼容项 | 支持范围 |
            |--------|----------|
            | 固件版本 | OpenWrt 18.06-24.10、ImmortalWrt、iStoreOS、LEDE |
            | 架构支持 | 全平台通用（x86/64、ARMv8、MT7981、MT7621等） |
            | 依赖要求 | curl、tar、gzip、coreutils-sha256sum、ca-bundle |
            
            ## 本次更新核心内容
            1. 【稳定】修复已知问题，优化备份恢复流程稳定性
            2. 【兼容】优化全机型固件适配，解决部分环境运行异常
            3. 【安全】完善防砖容错机制，操作失败自动回滚
            4. 【性能】优化备份打包速度，降低系统资源占用
            
            ## 安装说明
            1. 下载附件中的IPK安装包
            2. 登录路由器后台，进入系统-软件包-上传软件包
            3. 选择IPK文件上传安装，刷新页面即可看到插件入口
            EOF
          else
            # OpenWrt APK新版固件包专属更新说明，与副脚本完全匹配
            cat > RELEASE_NOTE.md << EOF
            ---
            ## 版本信息
            - 版本号：v${{ steps.info.outputs.VERSION }}
            - 发布时间：${{ github.event.release.published_at }}
            - 安装包类型：OpenWrt APK 新版固件专用包
            - 配套IPK版本：v${{ steps.info.outputs.VERSION }}
            
            ## 适配说明
            | 兼容项 | 支持范围 |
            |--------|----------|
            | 固件版本 | OpenWrt 25.12+ 及以上新版官方固件 |
            | 架构支持 | 全平台通用noarch包 |
            | 依赖要求 | curl、tar、gzip、coreutils-sha256sum、ca-bundle |
            
            ## 本次更新核心内容
            1. 【稳定】修复已知问题，和IPK版功能100%同步
            2. 【兼容】适配OpenWrt 25.12+新版固件的APK插件标准
            3. 【安全】完善防砖容错机制，操作失败自动回滚
            4. 【性能】优化备份打包速度，降低系统资源占用
            
            ## 安装说明
            1. 下载附件中的APK安装包
            2. 登录路由器后台，进入系统-软件包-上传软件包
            3. 选择APK文件上传安装，刷新页面即可看到插件入口
            4. 注意：旧版OpenWrt固件请使用IPK安装包，本APK包不兼容
            EOF
          fi

      - name: 给Release添加更新说明
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.info.outputs.RELEASE_TAG }}
          body_path: RELEASE_NOTE.md
          # 关键配置：true=追加说明，保留主副脚本原有发布内容；false=完全覆盖原有内容
          append_body: true
